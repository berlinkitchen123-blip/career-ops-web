<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Career-Ops · Job Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05070b;--surface:#0c0e14;--surface2:#121620;--border:#1e2538;
  --accent:#6366f1;--accent2:#818cf8;--green:#10b981;--red:#ef4444;
  --yellow:#f59e0b;--blue:#3b82f6;--text:#e2e8f0;--muted:#8892a4;--faint:#2a324b;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;font-size:15px;line-height:1.7;min-height:100vh}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(5,7,11,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px}
.nav-logo{font-weight:800;font-size:16px;color:var(--accent2);text-decoration:none;display:flex;align-items:center;gap:8px}
.nav-right{display:flex;align-items:center;gap:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent)}

/* MAIN */
main{padding:80px 24px 60px;max-width:1200px;margin:0 auto}

/* STATS BAR */
.stats-bar{display:flex;gap:16px;margin:24px 0 32px;flex-wrap:wrap}
.stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;display:flex;align-items:center;gap:10px}
.stat-num{font-size:22px;font-weight:800;color:var(--accent2)}
.stat-lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em}

/* FILTER TABS */
.filter-bar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.filter-tab{padding:6px 16px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s}
.filter-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-tab:hover:not(.active){border-color:var(--accent);color:var(--text)}

/* JOB GRID */
.jobs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}

/* JOB CARD */
.job-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;transition:all .2s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:12px}
.job-card:hover{border-color:rgba(99,102,241,.4);transform:translateY(-2px);box-shadow:0 16px 40px rgba(0,0,0,.4)}
.job-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.job-company{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.job-title{font-size:16px;font-weight:700;line-height:1.3}
.job-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.meta-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}

/* STATUS BADGES */
.status-badge{padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
.s-new{background:rgba(99,102,241,.15);color:var(--accent2);border:1px solid rgba(99,102,241,.3)}
.s-cv_ready{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
.s-reviewed{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.s-applied{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3)}
.s-interview{background:rgba(167,139,250,.15);color:#a78bfa;border:1px solid rgba(167,139,250,.3)}
.s-offer{background:rgba(16,185,129,.25);color:#10b981;border:1px solid rgba(16,185,129,.4)}
.s-rejected{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}

/* MATCH SCORE */
.match-ring{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;border:2px solid}
.match-high{border-color:var(--green);color:var(--green)}
.match-mid{border-color:var(--yellow);color:var(--yellow)}
.match-low{border-color:var(--red);color:var(--red)}

/* JD PREVIEW */
.jd-preview{font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;background:var(--surface2);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}

/* CARD ACTIONS */
.card-actions{display:flex;gap:8px;margin-top:4px}
.card-btn{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .15s;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px}
.card-btn-jd{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.card-btn-jd:hover{color:var(--text);border-color:var(--accent)}
.card-btn-cv{background:var(--accent);color:#fff}
.card-btn-cv:hover{background:var(--accent2)}
.card-btn-apply{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3)}
.card-btn-apply:hover{background:rgba(16,185,129,.25)}

/* STATUS SELECT */
.status-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:600;cursor:pointer;width:100%}
.status-select:focus{outline:none;border-color:var(--accent)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty-sub{font-size:14px;line-height:1.6}

/* ADD JOB MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:18px;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit}
.form-input:focus{outline:none;border-color:var(--accent)}
textarea.form-input{resize:vertical;min-height:120px}
.modal-actions{display:flex;gap:10px;margin-top:20px}

/* JD MODAL */
.jd-modal{max-width:720px}
.jd-content{font-size:13px;line-height:1.7;color:var(--muted);white-space:pre-wrap;margin-top:16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px;max-height:60vh;overflow-y:auto}

/* LOADING */
.loading{text-align:center;padding:60px;color:var(--muted);font-size:14px}

#toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;font-weight:600;z-index:300;display:none;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">🚀 Career-Ops</a>
  <div class="nav-right">
    <button class="btn btn-secondary" onclick="openAddModal()">+ Add Job</button>
  </div>
</nav>

<main>
  <div style="margin-top:8px">
    <h1 style="font-size:28px;font-weight:800;letter-spacing:-.02em">Job Pipeline</h1>
    <p style="color:var(--muted);font-size:14px;margin-top:4px">Review JDs, check tailored CVs, track applications.</p>
  </div>

  <div class="stats-bar" id="stats-bar">
    <div class="stat-chip"><span class="stat-num" id="stat-total">—</span><span class="stat-lbl">Total Jobs</span></div>
    <div class="stat-chip"><span class="stat-num" id="stat-cv">—</span><span class="stat-lbl">CV Ready</span></div>
    <div class="stat-chip"><span class="stat-num" id="stat-applied">—</span><span class="stat-lbl">Applied</span></div>
    <div class="stat-chip"><span class="stat-num" id="stat-interview">—</span><span class="stat-lbl">Interviews</span></div>
  </div>

  <div class="filter-bar">
    <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
    <button class="filter-tab" onclick="setFilter('new',this)">🆕 New</button>
    <button class="filter-tab" onclick="setFilter('cv_ready',this)">📄 CV Ready</button>
    <button class="filter-tab" onclick="setFilter('reviewed',this)">👁 Reviewed</button>
    <button class="filter-tab" onclick="setFilter('applied',this)">✅ Applied</button>
    <button class="filter-tab" onclick="setFilter('interview',this)">🎤 Interview</button>
    <button class="filter-tab" onclick="setFilter('offer',this)">🎉 Offer</button>
    <button class="filter-tab" onclick="setFilter('rejected',this)">❌ Rejected</button>
  </div>

  <div id="jobs-container"><div class="loading">Loading jobs…</div></div>
</main>

<!-- ADD JOB MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>➕ Add New Job</h3>
    <div class="form-group">
      <label class="form-label">Job Title *</label>
      <input class="form-input" id="f-title" placeholder="e.g. Senior Operations Manager" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">Company *</label>
      <input class="form-input" id="f-company" placeholder="e.g. Delivery Hero" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">Location</label>
      <input class="form-input" id="f-location" placeholder="e.g. Berlin, Germany" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">Job URL (LinkedIn / Indeed / etc.)</label>
      <input class="form-input" id="f-link" placeholder="https://..." type="url">
    </div>
    <div class="form-group">
      <label class="form-label">Match Score (0–100)</label>
      <input class="form-input" id="f-score" placeholder="e.g. 85" type="number" min="0" max="100">
    </div>
    <div class="form-group">
      <label class="form-label">Job Description *</label>
      <textarea class="form-input" id="f-jd" placeholder="Paste full job description here…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Source Site</label>
      <input class="form-input" id="f-source" placeholder="e.g. LinkedIn, Indeed, StepStone" type="text">
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="submitJob()" style="flex:1">Save Job</button>
      <button class="btn btn-secondary" onclick="closeModal('add-modal')">Cancel</button>
    </div>
  </div>
</div>

<!-- JD VIEW MODAL -->
<div class="modal-overlay" id="jd-modal">
  <div class="modal jd-modal">
    <div style="display:flex;justify-content:space-between;align-items:start;gap:16px">
      <div>
        <div id="jd-company" style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px"></div>
        <h3 id="jd-title" style="font-size:20px"></h3>
      </div>
      <button class="btn btn-secondary" onclick="closeModal('jd-modal')" style="flex-shrink:0">Close</button>
    </div>
    <div id="jd-meta" style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap"></div>
    <div class="jd-content" id="jd-body"></div>
    <div style="margin-top:16px;display:flex;gap:8px">
      <a id="jd-apply-link" href="#" target="_blank" rel="noopener" class="btn btn-primary" style="flex:1;justify-content:center">Open Job Posting ↗</a>
      <a id="jd-cv-link" href="#" class="btn btn-secondary" style="flex:1;justify-content:center">View / Edit CV →</a>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue, update } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVFwDMNN4p0MXzcpJi7amNPOiBPCRDJRQ",
  authDomain: "bellabona-logistic.firebaseapp.com",
  databaseURL: "https://bellabona-logistic-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bellabona-logistic",
  storageBucket: "bellabona-logistic.firebasestorage.app",
  messagingSenderId: "347002293332",
  appId: "1:347002293332:web:4afccdc6e6c5690539b1c1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let allJobs = {};
let currentFilter = 'all';

// STATUS CONFIG
const STATUS_LABELS = {
  new: '🆕 New',
  cv_ready: '📄 CV Ready',
  reviewed: '👁 Reviewed',
  applied: '✅ Applied',
  interview: '🎤 Interview',
  offer: '🎉 Offer',
  rejected: '❌ Rejected'
};

// LOAD JOBS
const jobsRef = ref(db, 'career-ops/jobs');
onValue(jobsRef, (snap) => {
  allJobs = snap.val() || {};
  renderJobs();
  updateStats();
});

function renderJobs() {
  const container = document.getElementById('jobs-container');
  const entries = Object.entries(allJobs)
    .filter(([,j]) => currentFilter === 'all' || j.status === currentFilter)
    .sort((a,b) => (b[1].dateAdded||'').localeCompare(a[1].dateAdded||''));

  if (!entries.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">${currentFilter === 'all' ? 'No jobs yet' : 'No ' + STATUS_LABELS[currentFilter] + ' jobs'}</div>
      <div class="empty-sub">${currentFilter === 'all' ? 'Click "Add Job" to add a job manually, or let Claude hunt on LinkedIn for you.' : 'Change filter to see other jobs.'}</div>
    </div>`;
    return;
  }

  container.innerHTML = `<div class="jobs-grid">${entries.map(([id,j]) => jobCard(id,j)).join('')}</div>`;
}

function jobCard(id, j) {
  const score = j.matchScore || 0;
  const ringClass = score >= 75 ? 'match-high' : score >= 50 ? 'match-mid' : 'match-low';
  const statusClass = 's-' + (j.status || 'new');
  const jdShort = (j.jd || '').slice(0,200);
  const cvLink = `cv-studio.html?jobId=${encodeURIComponent(id)}`;

  const statusOptions = Object.keys(STATUS_LABELS).map(s =>
    `<option value="${s}" ${j.status===s?'selected':''}>${STATUS_LABELS[s]}</option>`
  ).join('');

  return `<div class="job-card">
    <div class="job-card-top">
      <div style="flex:1;min-width:0">
        <div class="job-company">${esc(j.company||'—')}</div>
        <div class="job-title">${esc(j.title||'Untitled')}</div>
      </div>
      ${score ? `<div class="match-ring ${ringClass}">${score}%</div>` : ''}
    </div>

    <div class="job-meta">
      <span class="status-badge ${statusClass}">${STATUS_LABELS[j.status||'new']}</span>
      ${j.location ? `<span class="meta-pill">📍 ${esc(j.location)}</span>` : ''}
      ${j.source ? `<span class="meta-pill">🌐 ${esc(j.source)}</span>` : ''}
      ${j.dateAdded ? `<span class="meta-pill">📅 ${j.dateAdded}</span>` : ''}
    </div>

    ${jdShort ? `<div class="jd-preview">${esc(jdShort)}…</div>` : ''}

    <div>
      <label class="form-label" style="margin-bottom:4px">Update Status</label>
      <select class="status-select" onchange="updateStatus('${id}', this.value)">${statusOptions}</select>
    </div>

    <div class="card-actions">
      <button class="card-btn card-btn-jd" onclick="viewJD('${id}')">📋 View JD</button>
      <a class="card-btn card-btn-cv" href="${cvLink}">📄 View CV</a>
      ${j.link ? `<a class="card-btn card-btn-apply" href="${esc(j.link)}" target="_blank" rel="noopener">Apply ↗</a>` : ''}
    </div>
  </div>`;
}

function updateStats() {
  const jobs = Object.values(allJobs);
  document.getElementById('stat-total').textContent = jobs.length;
  document.getElementById('stat-cv').textContent = jobs.filter(j=>j.status==='cv_ready'||j.status==='reviewed').length;
  document.getElementById('stat-applied').textContent = jobs.filter(j=>j.status==='applied').length;
  document.getElementById('stat-interview').textContent = jobs.filter(j=>j.status==='interview').length;
}

// FILTER
window.setFilter = (f, el) => {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderJobs();
};

// UPDATE STATUS
window.updateStatus = async (id, status) => {
  await update(ref(db, `career-ops/jobs/${id}`), { status });
  toast('Status updated');
};

// VIEW JD
window.viewJD = (id) => {
  const j = allJobs[id];
  if (!j) return;
  document.getElementById('jd-company').textContent = j.company || '';
  document.getElementById('jd-title').textContent = j.title || 'Job Detail';
  document.getElementById('jd-body').textContent = j.jd || 'No description saved.';
  document.getElementById('jd-meta').innerHTML = [
    j.location ? `<span class="meta-pill">📍 ${esc(j.location)}</span>` : '',
    j.source ? `<span class="meta-pill">🌐 ${esc(j.source)}</span>` : '',
    j.dateAdded ? `<span class="meta-pill">📅 ${j.dateAdded}</span>` : '',
    j.matchScore ? `<span class="meta-pill">🎯 ${j.matchScore}% match</span>` : ''
  ].join('');
  const applyLink = document.getElementById('jd-apply-link');
  applyLink.href = j.link || '#';
  applyLink.style.display = j.link ? '' : 'none';
  document.getElementById('jd-cv-link').href = `cv-studio.html?jobId=${encodeURIComponent(id)}`;
  document.getElementById('jd-modal').classList.add('open');
};

// ADD JOB MODAL
window.openAddModal = () => document.getElementById('add-modal').classList.add('open');
window.closeModal = (id) => document.getElementById(id).classList.remove('open');

window.submitJob = async () => {
  const title = document.getElementById('f-title').value.trim();
  const company = document.getElementById('f-company').value.trim();
  const jd = document.getElementById('f-jd').value.trim();
  if (!title || !company || !jd) { toast('Title, Company and JD are required', true); return; }

  const jobsRef2 = ref(db, 'career-ops/jobs');
  const newRef = push(jobsRef2);
  await set(newRef, {
    title,
    company,
    location: document.getElementById('f-location').value.trim(),
    link: document.getElementById('f-link').value.trim(),
    matchScore: parseInt(document.getElementById('f-score').value)||0,
    jd,
    source: document.getElementById('f-source').value.trim(),
    status: 'new',
    dateAdded: new Date().toISOString().slice(0,10)
  });

  ['f-title','f-company','f-location','f-link','f-score','f-jd','f-source'].forEach(id => document.getElementById(id).value='');
  closeModal('add-modal');
  toast('Job added!');
};

// TOAST
function toast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.borderColor = isError ? 'var(--red)' : 'var(--green)';
  setTimeout(()=>el.style.display='none', 2500);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if(e.target===el) el.classList.remove('open'); });
});
</script>
</body>
</html>
